name: Banking DevSecOps CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Security scan
        run: bandit -r app

      - name: Run tests
        run: pytest -v

      - name: Build Docker image
        run: docker build -t banking-devsecops-api:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: banking-devsecops-api:ci
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
